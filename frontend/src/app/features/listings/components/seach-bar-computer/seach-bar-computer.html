<app-city-autocomplete-component
  [cities]="cities"
  label="{{ 'SEARCH.CAMEROON_PLACEHOLDER' | translate }}"
  placeholder="Ex: Douala, Yaoundé…"
  [(ngModel)]="destCity"
  name="destCity"
  [showSearchIcon]="true"
  (searchClick)="onSearch()"
  [required]="false"
  [minlength]="2">
</app-city-autocomplete-component>
