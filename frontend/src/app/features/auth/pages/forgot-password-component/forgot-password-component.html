<div class="">
    <h1 class="page-title"> {{'FORGOT_PASSWORD.TITLE' | translate }} </h1>
    <p class="mb-4"> {{'FORGOT_PASSWORD.TEXT' | translate }} </p>

    <form (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="w-100 mb-4" style="width: 100%;">
            <mat-label>Email</mat-label>
            <input matInput type="email" name="email" [(ngModel)]="email" required autocomplete="email"
                placeholder="ex: toi@gmail.com" />
            <mat-hint> {{'FORGOT_PASSWORD.INFO' | translate }} </mat-hint>
        </mat-form-field>

        <button 
            class="btn-app btn-app-primary" mat-raised-button color="" type="submit" [disabled]="loading || !email.trim()">
            {{
                loading
                ? ('FORGOT_PASSWORD.SENDING' | translate)
                : ('FORGOT_PASSWORD.SEND_LINK' | translate)
            }}
        </button>

        <button class="btn-app btn-app-outline-secondary" mat-button type="button" routerLink="/auth/login" style="margin-left: 8px;">
             {{'FORGOT_PASSWORD.BACK_TO_LOGIN' | translate }} 
        </button>
    </form>
</div>
