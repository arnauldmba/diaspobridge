
<div class="verify-container">
    <h1 class="app-title-color page-title">{{'VERIFY_EMAIL.TITLE' | translate}}</h1>
    <p class="subtitle">
        {{'VERIFY_EMAIL.TEXT' | translate}}
    </p>

    <!-- ✅ Message feedback -->
    <div *ngIf="message" class="alert success">
        {{ message }}
    </div>
    <div *ngIf="error" class="alert error">
        {{ error }}
    </div>

    <!-- ✅ Vérification code -->
    <form (ngSubmit)="onVerify()" class="card">
        <label for="code">{{'VERIFY_EMAIL.CODE' | translate}}</label>

        <input id="code" type="text" name="code" [(ngModel)]="code" placeholder="Ex: 482913"
            autocomplete="one-time-code" inputmode="numeric" maxlength="10" required />

        <button type="submit" [disabled]="loading || !code.trim()">
            {{ loading ? 'Vérification...' : 'Vérifier' }}
        </button>

        <p class="hint">
            {{'VERIFY_EMAIL.EXPIRES' | translate}}
        </p>
    </form>

    <!-- Renvoyer le code -->
    <div class="card resend">
        <h3>{{'VERIFY_EMAIL.NOT_RECEIVED' | translate}} ?</h3>
        <p class="subtitle">
            {{'VERIFY_EMAIL.RESEND_TEXT' | translate}}
        </p>

        <form (ngSubmit)="onResend()">
            <label for="email">{{'VERIFY_EMAIL.EMAIL_ADDRESS' | translate}}</label>
            <input id="email" type="email" name="email" [(ngModel)]="email" placeholder="ton.email@example.com"
                autocomplete="email" required />

            <button type="submit" class="secondary" [disabled]="resending || !email.trim()">
                {{ resending ? 'Envoi...' : 'Renvoyer le code' }}
            </button>
        </form>

        <p class="hint">
            {{'VERIFY_EMAIL.SECURITY_INFO' | translate}}
        </p>
    </div>
</div>
