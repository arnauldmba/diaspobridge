<div class="justify-content-center d-grid">
  <div>
    <h1 class="app-title-color page-title mb-4"> {{'RESET_PASSWORD.TITLE' | translate }} </h1>

    <ng-container *ngIf="token; else missingToken">
      <form (ngSubmit)="submit()">
        <mat-form-field appearance="outline" style="width: 100%;" class="mb-3">
          <mat-label>{{'RESET_PASSWORD.NEW_PASSWORD' | translate }}</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput [type]="hide1 ? 'password' : 'text'" name="newPassword" [(ngModel)]="newPassword" required
            minlength="8" autocomplete="new-password" placeholder="Minimum 8 caractères" />
          <button mat-icon-button matSuffix type="button" (click)="hide1 = !hide1" aria-label="toggle password" class="icon-show-password">
            <mat-icon>{{ hide1 ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-hint>{{'RESET_PASSWORD.MIN_8' | translate }}</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline" style="width: 100%;">
          <mat-label>{{'RESET_PASSWORD.CONFIRM_PASSWORD' | translate }}</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput [type]="hide2 ? 'password' : 'text'" name="confirmPassword" [(ngModel)]="confirmPassword"
            required autocomplete="new-password" placeholder="Retape le mot de passe" />
          <button mat-icon-button matSuffix type="button" (click)="hide2 = !hide2" aria-label="toggle password" class="icon-show-password">
            <mat-icon>{{ hide2 ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="confirmPassword && newPassword !== confirmPassword">
            {{'RESET_PASSWORD.PASSWORD_MISMATCH' | translate }}
          </mat-error>
        </mat-form-field>

        <button class="btn-app btn-app-primary" mat-raised-button color="primary" type="submit" [disabled]="!canSubmit">
          {{ loading ? 'Réinitialisation...' : 'Réinitialiser' }}
        </button>

        <button class="btn-app btn-app-outline-secondary" mat-button type="button" routerLink="/auth/forgot-password" style="margin-left: 8px;">
          {{'RESET_PASSWORD.RESEND_LINK' | translate }}
        </button>
      </form>
    </ng-container>

    <ng-template #missingToken>
      <p>{{'RESET_PASSWORD.INVALID_LINK' | translate }}</p>
      <button mat-raised-button color="primary" routerLink="/auth/forgot-password">
        {{'RESET_PASSWORD.REQUEST_NEW_LINK' | translate }}
      </button>
    </ng-template>
  </div>
</div>
